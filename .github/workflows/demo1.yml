name: Events Demo 1
#on: push ## if branch is not specified, it will trigger on all branches
on:
  pull_request:
    types: opened
  workflow_dispatch: ## allows you to trigger the workflow manually from the GitHub UI
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Output event data
        run: echo "${{ toJSON(github.event) }}"
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Test code
        run: npm run test
      - name: Build code
        run: npm run build
      - name: Deploy project
        run: echo "Deploying..."